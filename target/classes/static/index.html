<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-Rag Chat</title>
  <style>
    :root {
      --bg: #f5fbff;
      --panel: #ffffff;
      --line: #dbeaf6;
      --text: #1d3a52;
      --muted: #5f7f97;
      --primary: #2d8ac9;
      --primary-soft: #eaf6ff;
      --sidebar-bg: #e9f5ff;
      --sidebar-text: #1f4662;
      --sidebar-muted: #5f85a0;
      --sidebar-item: #f6fbff;
      --sidebar-item-hover: #e8f4ff;
      --radius: 14px;
      --shadow: 0 12px 28px rgba(61, 140, 196, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% -10%, #d8efff 0, transparent 45%), var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100dvh;
      overflow: hidden;
      will-change: grid-template-columns;
      transition: grid-template-columns 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar {
      background: linear-gradient(180deg, #e7f4ff 0%, #f3faff 100%);
      color: var(--sidebar-text);
      border-right: 1px solid #c8e1f2;
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
      gap: 14px;
      transition: padding 0.32s cubic-bezier(0.22, 1, 0.36, 1), gap 0.28s ease;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      overflow: hidden;
      will-change: opacity, transform, max-height;
      max-height: 36px;
      transition: opacity 0.28s ease, transform 0.32s ease, max-height 0.32s ease;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sidebar-toggle {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid #90bddb;
      background: #d7ecfa;
      color: #1e5679;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.24s ease, transform 0.3s ease;
    }

    .sidebar-toggle:hover {
      background: #c6e5f9;
      transform: translateY(-1px);
    }

    .upload-wrap {
      border: 1px solid #b4d6ee;
      border-radius: 12px;
      padding: 10px;
      background: #fafdff;
      overflow: hidden;
      will-change: opacity, transform, max-height;
      max-height: 240px;
      transition: opacity 0.28s ease, transform 0.32s ease, max-height 0.32s ease;
    }

    .upload-title {
      font-size: 12px;
      color: var(--sidebar-muted);
      margin-bottom: 8px;
    }

    .upload-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(120deg, #3aa7ee 0%, #2d8ac9 100%);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 22px rgba(54, 144, 203, 0.3);
    }

    .upload-btn:hover {
      transform: translateY(-1px);
    }

    .upload-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .upload-meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--sidebar-muted);
      line-height: 1.45;
      min-height: 34px;
    }

    .kb-title {
      font-size: 12px;
      color: var(--sidebar-muted);
      margin: 4px 0 0;
      padding: 0 2px;
      overflow: hidden;
      will-change: opacity, transform, max-height;
      max-height: 20px;
      transition: opacity 0.28s ease, transform 0.32s ease, max-height 0.32s ease;
    }

    .kb-list {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
      will-change: opacity, transform, max-height;
      max-height: 100%;
      transition: opacity 0.28s ease, transform 0.32s ease, max-height 0.32s ease;
    }

    .kb-item {
      border: 1px solid #c4dff2;
      border-radius: 12px;
      background: var(--sidebar-item);
      position: relative;
      padding: 10px 34px 10px 10px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .kb-item:hover {
      background: var(--sidebar-item-hover);
      transform: translateY(-1px);
    }

    .kb-item.active {
      border-color: #6ab1dd;
      background: #e0f2ff;
    }

    .kb-name {
      font-size: 13px;
      font-weight: 700;
      color: #1f4d6d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .kb-meta {
      margin-top: 4px;
      font-size: 11px;
      color: #6d8ca4;
      line-height: 1.4;
    }

    .kb-question {
      margin-top: 7px;
      font-size: 12px;
      color: #2f5c7b;
      background: rgba(133, 193, 233, 0.2);
      border: 1px solid rgba(128, 189, 230, 0.35);
      border-radius: 9px;
      padding: 7px 8px;
      line-height: 1.45;
    }

    .kb-delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      border: 1px solid #b7d7ec;
      border-radius: 50%;
      background: #f8fcff;
      color: #7b9ab0;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .kb-item:hover .kb-delete-btn,
    .kb-item.active .kb-delete-btn {
      opacity: 1;
      transform: scale(1);
    }

    .kb-delete-btn:hover {
      background: #ffeef0;
      color: #c23648;
      border-color: #efbdc4;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      height: 58px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.65);
    }

    .active-name {
      font-size: 14px;
      font-weight: 600;
      color: #173f5d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 560px;
    }

    .github-link {
      font-size: 12px;
      color: #164766;
      text-decoration: none;
      background: linear-gradient(135deg, #f7fcff 0%, #dff2ff 100%);
      border: 1px solid #9fd0f0;
      border-radius: 999px;
      padding: 7px 14px;
      font-weight: 700;
      transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
      box-shadow: 0 8px 18px rgba(66, 153, 212, 0.2);
    }

    .github-link:hover {
      background: linear-gradient(135deg, #e8f7ff 0%, #cfeeff 100%);
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(66, 153, 212, 0.28);
    }

    .chat-scroll {
      overflow: auto;
      min-height: 0;
      padding: 24px 0;
      overscroll-behavior: contain;
    }

    .chat-wrap {
      width: min(860px, calc(100% - 36px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 92%;
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.72;
      animation: fadeUp 0.24s ease;
      border: 1px solid transparent;
    }

    .msg.user .msg-content {
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary-soft);
      border-color: #d7e4ff;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #ffffff;
      border-color: #eaedf3;
      box-shadow: var(--shadow);
    }

    .msg-source {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .msg-content p {
      margin: 0 0 10px;
    }

    .msg-content p:last-child {
      margin-bottom: 0;
    }

    .msg-content h1,
    .msg-content h2,
    .msg-content h3 {
      margin: 4px 0 10px;
      line-height: 1.35;
    }

    .msg-content ul {
      margin: 4px 0 10px 20px;
      padding: 0;
    }

    .msg-content li {
      margin: 4px 0;
    }

    .msg-content code {
      background: #eef2f7;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9em;
    }

    .msg-content pre {
      margin: 8px 0;
      background: #0f172a;
      color: #e5e7eb;
      padding: 10px 12px;
      border-radius: 10px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }

    .msg-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .composer-shell {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
      background: #fff;
      position: sticky;
      bottom: 0;
      z-index: 4;
    }

    .composer {
      width: min(860px, calc(100% - 36px));
      margin: 0 auto;
      border: 1px solid #dfe4ed;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer:focus-within {
      border-color: #b4c8ff;
      box-shadow: 0 10px 26px rgba(59, 130, 246, 0.16);
    }

    #questionInput {
      border: 0;
      outline: none;
      resize: none;
      min-height: 46px;
      max-height: 180px;
      font: inherit;
      line-height: 1.6;
      color: #111827;
      padding: 6px 8px;
      background: transparent;
    }

    .composer-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: 46px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-btn {
      border: 1px solid #bdd6e7;
      background: linear-gradient(130deg, #eef7ff 0%, #e6f3ff 100%);
      color: #244254;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
      box-shadow: 0 6px 16px rgba(59, 111, 139, 0.14);
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(59, 111, 139, 0.2);
    }

    .toggle-btn.active {
      background: linear-gradient(130deg, #d9f1ff 0%, #c8e9ff 100%);
      border-color: #7eb6de;
      box-shadow: 0 0 0 4px rgba(70, 141, 191, 0.14), 0 10px 22px rgba(59, 111, 139, 0.22);
      animation: pulseToggle 0.42s ease;
    }

    #mindMapBtn {
      width: 68px;
      height: 44px;
      font-size: 12px;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #39a8ef 0%, #2d8ac9 100%);
      color: #fff;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.2s ease;
      font-size: 18px;
    }

    .send-btn:hover {
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .composer-tip {
      width: min(860px, calc(100% - 36px));
      margin: 7px auto 0;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
    }

    .mindmap-image {
      margin-top: 8px;
      width: min(100%, 620px);
      border-radius: 12px;
      border: 1px solid #d2e9f8;
      box-shadow: 0 8px 20px rgba(82, 157, 206, 0.18);
      display: block;
    }

    .warn {
      color: #b45309;
    }

    .error {
      color: #b91c1c;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseToggle {
      0% {
        transform: scale(0.96);
      }
      65% {
        transform: scale(1.04);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(220px, 34vh) minmax(0, 1fr);
      }

      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: 64px minmax(0, 1fr);
      }

      .sidebar {
        height: auto;
        overflow: auto;
      }

      .main {
        min-height: 0;
      }

      .chat-wrap,
      .composer,
      .composer-tip {
        width: calc(100% - 20px);
      }
    }

    .app.sidebar-collapsed {
      grid-template-columns: 74px 1fr;
    }

    .app:not(.sidebar-collapsed) .logo,
    .app:not(.sidebar-collapsed) .upload-wrap,
    .app:not(.sidebar-collapsed) .kb-title,
    .app:not(.sidebar-collapsed) .kb-list {
      opacity: 1;
      transform: translateX(0);
      max-height: 480px;
      pointer-events: auto;
      transition-delay: 0.05s;
    }

    .app.sidebar-collapsed .logo,
    .app.sidebar-collapsed .upload-wrap,
    .app.sidebar-collapsed .kb-title,
    .app.sidebar-collapsed .kb-list {
      opacity: 0;
      transform: translateX(-14px);
      max-height: 0;
      margin: 0;
      pointer-events: none;
      transition-delay: 0s;
    }

    .app.sidebar-collapsed .logo {
      max-width: 0;
      width: 0;
      margin: 0;
    }

    .app.sidebar-collapsed .sidebar {
      align-items: center;
      padding: 14px 8px;
    }

    .app.sidebar-collapsed .sidebar-head {
      justify-content: center;
      width: 100%;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      transform: rotate(180deg);
    }

    .log-fab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 12;
      border: 1px solid #8ac0e5;
      background: linear-gradient(135deg, #eef8ff 0%, #d7ecff 100%);
      color: #1d4a69;
      border-radius: 999px;
      min-width: 56px;
      height: 42px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(57, 136, 191, 0.26);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .log-fab:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(57, 136, 191, 0.3);
    }

    .log-modal {
      position: fixed;
      right: 18px;
      bottom: 68px;
      width: min(420px, calc(100vw - 24px));
      max-height: 62vh;
      z-index: 13;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .log-modal.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .log-panel {
      border: 1px solid #bedef5;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 18px 34px rgba(42, 105, 148, 0.22);
      overflow: hidden;
    }

    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #e2eef8;
      background: linear-gradient(140deg, #f6fbff 0%, #ecf7ff 100%);
      font-size: 13px;
      font-weight: 700;
      color: #224f70;
    }

    .log-close {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 8px;
      background: #d8eefe;
      color: #255773;
      cursor: pointer;
      font-weight: 700;
    }

    .log-content {
      max-height: calc(62vh - 46px);
      overflow: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 12px;
      color: #2a4f69;
    }

    .log-group {
      border: 1px solid #e0edf8;
      border-radius: 10px;
      padding: 8px;
      background: #fbfeff;
    }

    .log-group-title {
      font-size: 12px;
      font-weight: 700;
      color: #205172;
      margin-bottom: 7px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px dashed #e9f2f9;
    }

    .log-row:last-child {
      border-bottom: 0;
    }

    .log-key {
      color: #4d6f86;
      word-break: break-all;
    }

    .log-value {
      font-weight: 700;
      color: #1f4662;
      text-align: right;
      word-break: break-all;
    }

    .log-empty {
      color: #5f7f97;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">P-Rag Workspace</div>
      <button id="sidebarToggle" class="sidebar-toggle" title="收起/展开">☰</button>
    </div>

    <div class="upload-wrap">
      <div class="upload-title">上传 Markdown 到新知识库</div>
      <input id="mdFile" type="file" accept=".md,text/markdown" style="display:none">
      <button id="uploadBtn" class="upload-btn">+ 上传并创建新对话</button>
      <div id="uploadMeta" class="upload-meta">未选择文件</div>
      <div class="upload-meta" style="min-height:0;">检索参数已自动优化</div>
    </div>

    <div class="kb-title">知识库会话记录</div>
    <div id="kbList" class="kb-list"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="dot"></div>
        <div id="activeName" class="active-name">请先上传 Markdown 文件开始对话</div>
      </div>
      <a class="github-link" href="https://github.com/snaplap/P-Rag" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
    </header>

    <section id="chatScroll" class="chat-scroll">
      <div id="chatWrap" class="chat-wrap"></div>
    </section>

    <footer class="composer-shell">
      <div class="composer">
        <textarea id="questionInput" placeholder="给知识库提问，Enter 发送，Shift+Enter 换行"></textarea>
        <div class="composer-actions">
          <div class="top-actions">
            <button id="mindMapBtn" class="toggle-btn" type="button" title="输出思维导图">导图</button>
            <button id="sendBtn" class="send-btn" title="发送">↑</button>
          </div>
        </div>
      </div>
      <div class="composer-tip">
        <span>系统会自动判断是否需要联网并融合知识库证据</span>
        <span id="minorHint">自动策略已开启</span>
      </div>
    </footer>
  </main>
</div>

<button id="logBtn" class="log-fab" type="button" title="查看本轮日志指标">日志</button>
<div id="logModal" class="log-modal" role="dialog" aria-modal="false" aria-label="日志指标弹窗">
  <div class="log-panel">
    <div class="log-head">
      <span>实时日志指标</span>
      <button id="logCloseBtn" class="log-close" type="button" title="关闭">×</button>
    </div>
    <div id="logContent" class="log-content"></div>
  </div>
</div>

<script>
  const appRoot = document.querySelector(".app");
  const sidebarToggle = document.getElementById("sidebarToggle");
  const mdFile = document.getElementById("mdFile");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadMeta = document.getElementById("uploadMeta");
  const kbList = document.getElementById("kbList");
  const activeName = document.getElementById("activeName");
  const FIXED_TOP_K = 5;
  const questionInput = document.getElementById("questionInput");
  const mindMapBtn = document.getElementById("mindMapBtn");
  const sendBtn = document.getElementById("sendBtn");
  const chatWrap = document.getElementById("chatWrap");
  const chatScroll = document.getElementById("chatScroll");
  const minorHint = document.getElementById("minorHint");
  const logBtn = document.getElementById("logBtn");
  const logModal = document.getElementById("logModal");
  const logCloseBtn = document.getElementById("logCloseBtn");
  const logContent = document.getElementById("logContent");

  const MAX_HISTORY_MESSAGES = 120;
  const MAX_MESSAGE_CHARS = 12000;

  let traces = [];
  let active = null;
  let currentHistory = [];
  let enableMindMap = true;
  let logMetricsByKnowledgeBase = {};

  initialize();

  async function initialize() {
    initSidebarState();
    bindEvents();
    applyMindMapUiState();
    await loadKnowledgeBases();
    if (!active) {
      appendMessage("assistant", "欢迎使用。先上传一个 Markdown 文件，我会为它创建独立知识库并开启新对话。");
    }
  }

  function bindEvents() {
    sidebarToggle.addEventListener("click", toggleSidebar);
    mindMapBtn.addEventListener("click", toggleMindMap);
    logBtn.addEventListener("click", toggleLogModal);
    logCloseBtn.addEventListener("click", closeLogModal);
    document.addEventListener("click", closeLogModalOnOutsideClick);

    uploadBtn.addEventListener("click", () => mdFile.click());

    mdFile.addEventListener("change", async () => {
      const file = mdFile.files && mdFile.files[0];
      if (!file) {
        uploadMeta.textContent = "未选择文件";
        return;
      }
      uploadMeta.textContent = "已选择: " + file.name;
      await uploadMarkdown(file);
    });

    sendBtn.addEventListener("click", () => sendQuestion());

    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });
  }

  async function uploadMarkdown(file) {
    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadMeta.textContent = "上传中...";
    uploadMeta.className = "upload-meta";

    try {
      const response = await fetch("/api/rag/ingest/markdown", {
        method: "POST",
        body: formData
      });
      if (!response.ok) {
        throw new Error("上传失败，状态码 " + response.status);
      }

      const result = await response.json();
      active = {
        knowledgeBaseId: result.knowledgeBaseId,
        sessionId: result.sessionId,
        fileName: result.fileName || result.knowledgeBaseId,
        chunkCount: result.chunkCount
      };

      saveHistory(active.knowledgeBaseId, [
        {
          role: "assistant",
          text: "已完成文档上传。现在可以开始针对该文档提问。"
        }
      ]);

      uploadMeta.textContent = "上传成功: " + active.fileName + "（" + active.chunkCount + " 段）";
      uploadMeta.className = "upload-meta";
      await loadKnowledgeBases();
      switchKnowledge(active.knowledgeBaseId);
    } catch (error) {
      uploadMeta.textContent = "上传失败: " + (error.message || "未知错误");
      uploadMeta.className = "upload-meta error";
    } finally {
      uploadBtn.disabled = false;
    }
  }

  async function loadKnowledgeBases() {
    try {
      const response = await fetch("/api/rag/knowledge-bases", { method: "GET" });
      if (!response.ok) {
        throw new Error("加载知识库列表失败");
      }

      traces = await response.json();
      renderKbList();

      if (!active && traces.length > 0) {
        active = {
          knowledgeBaseId: traces[0].knowledgeBaseId,
          sessionId: traces[0].sessionId,
          fileName: traces[0].fileName,
          chunkCount: traces[0].chunkCount
        };
        switchKnowledge(active.knowledgeBaseId);
      }
    } catch (error) {
      kbList.innerHTML = "<div class='kb-meta'>知识库历史加载失败</div>";
    }
  }

  function renderKbList() {
    kbList.innerHTML = "";
    if (!Array.isArray(traces) || traces.length === 0) {
      kbList.innerHTML = "<div class='kb-meta'>暂无知识库记录</div>";
      return;
    }

    traces.forEach((trace) => {
      const item = document.createElement("div");
      item.className = "kb-item" + (active && active.knowledgeBaseId === trace.knowledgeBaseId ? " active" : "");

      const history = readHistory(trace.knowledgeBaseId);
      const lastUser = [...history].reverse().find((m) => m.role === "user");
      const preview = lastUser ? shorten(lastUser.text, 20) : "暂无提问记录";

      item.innerHTML = [
        "<div class='kb-name'>" + escapeHtml(trace.fileName || trace.knowledgeBaseId) + "</div>",
        "<div class='kb-question'>" + escapeHtml(preview) + "</div>",
        "<div class='kb-meta'>KB: " + escapeHtml(trace.knowledgeBaseId) + "</div>"
      ].join("");

      const deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "kb-delete-btn";
      deleteBtn.title = "删除知识库";
      deleteBtn.textContent = "×";
      deleteBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        deleteKnowledgeBase(trace.knowledgeBaseId);
      });
      item.appendChild(deleteBtn);

      item.addEventListener("click", () => switchKnowledge(trace.knowledgeBaseId));
      kbList.appendChild(item);
    });
  }

  function switchKnowledge(knowledgeBaseId) {
    const trace = traces.find((t) => t.knowledgeBaseId === knowledgeBaseId);
    if (!trace) {
      return;
    }

    active = {
      knowledgeBaseId: trace.knowledgeBaseId,
      sessionId: trace.sessionId,
      fileName: trace.fileName || trace.knowledgeBaseId,
      chunkCount: trace.chunkCount
    };

    activeName.textContent = "当前知识库: " + active.fileName;
    renderKbList();

    currentHistory = readHistory(active.knowledgeBaseId);
    renderChatHistory(currentHistory);
    resetMinorHint();
  }

  async function deleteKnowledgeBase(knowledgeBaseId) {
    if (!knowledgeBaseId) {
      return;
    }

    const trace = traces.find((t) => t.knowledgeBaseId === knowledgeBaseId);
    const displayName = trace && trace.fileName ? trace.fileName : knowledgeBaseId;
    const confirmed = window.confirm("此操作将会删除知识库和对话记录，确认删除吗？\n\n" + displayName);
    if (!confirmed) {
      return;
    }

    try {
      const response = await fetch("/api/rag/knowledge-bases/" + encodeURIComponent(knowledgeBaseId), {
        method: "DELETE"
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch (_) {
        payload = null;
      }

      if (!response.ok) {
        throw new Error(payload && payload.error ? payload.error : "删除失败，状态码 " + response.status);
      }

      localStorage.removeItem(historyKey(knowledgeBaseId));
      delete logMetricsByKnowledgeBase[knowledgeBaseId];

      if (active && active.knowledgeBaseId === knowledgeBaseId) {
        active = null;
        currentHistory = [];
        chatWrap.innerHTML = "";
        activeName.textContent = "请先上传 Markdown 文件开始对话";
      }

      minorHint.textContent = "知识库删除成功";
      minorHint.className = "";
      await loadKnowledgeBases();
      renderLogMetricsPanel();

      if (!active && traces.length === 0) {
        appendMessage("assistant", "该知识库已删除。请上传新的 Markdown 文件开始对话。", "");
      }
    } catch (error) {
      minorHint.textContent = "删除失败: " + (error.message || "未知错误");
      minorHint.className = "error";
    }
  }

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question) {
      return;
    }
    if (!active) {
      minorHint.textContent = "请先上传文件后再提问";
      minorHint.className = "warn";
      return;
    }

    currentHistory.push({ role: "user", text: question });
    currentHistory = normalizeHistory(currentHistory);
    saveHistory(active.knowledgeBaseId, currentHistory);
    const userNode = appendMessage("user", question, null);
    userNode.scrollIntoView({ behavior: "smooth", block: "end" });

    questionInput.value = "";
    questionInput.style.height = "46px";
    sendBtn.disabled = true;
    minorHint.className = "";

    const assistantMessage = { role: "assistant", text: "", source: "" };
    currentHistory.push(assistantMessage);
    currentHistory = normalizeHistory(currentHistory);
    saveHistory(active.knowledgeBaseId, currentHistory);
    const assistantNode = appendMessage("assistant", "", "");
    let streamedChunks = 0;

    const handleStreamEvent = (evt) => {
      if (evt.name === "chunk") {
        const payload = safeJson(evt.data);
        if (payload && payload.content) {
          assistantMessage.text += payload.content;
          currentHistory[currentHistory.length - 1] = { ...assistantMessage };
          updateMessageNode(assistantNode, assistantMessage);
          streamedChunks++;
          if (streamedChunks % 8 === 0) {
            currentHistory = normalizeHistory(currentHistory);
            saveHistory(active.knowledgeBaseId, currentHistory);
          }
        }
      }

      if (evt.name === "final") {
        const payload = safeJson(evt.data);
        if (payload) {
          assistantMessage.source = payload.source || "知识库";
          currentHistory[currentHistory.length - 1] = { ...assistantMessage };
          if (payload.uncertain) {
            minorHint.textContent = "当前回答存在不确定性，可补充文档后再试";
            minorHint.className = "warn";
          }
          if (payload.mindMapCommand) {
            const mindMapRender = appendMindMapImage(payload.mindMapCommand);
            if (mindMapRender && mindMapRender.rendered) {
              if (mindMapRender.fallback) {
                const fallbackReason = mindMapRender.reason ? "（原因: " + mindMapRender.reason + "）" : "";
                minorHint.textContent = "已生成回退导图" + fallbackReason;
                minorHint.className = "warn";
              } else if (!payload.uncertain) {
                minorHint.textContent = "已触发思维导图生成";
                minorHint.className = "";
              }
            } else {
              minorHint.textContent = "导图指令已返回，但未提供可渲染图片地址";
              minorHint.className = "warn";
            }
          } else if (payload.mindMapEnabled) {
            minorHint.textContent = "导图生成失败，请检查 MCP 服务";
            minorHint.className = "error";
          }
          if (payload.logMetrics && active && active.knowledgeBaseId) {
            logMetricsByKnowledgeBase[active.knowledgeBaseId] = payload.logMetrics;
            renderLogMetricsPanel();
          }
          updateMessageNode(assistantNode, assistantMessage);
        }
      }

      if (evt.name === "error") {
        const payload = safeJson(evt.data);
        throw new Error(payload && payload.message ? payload.message : "服务端流式错误");
      }
    };

    try {
      const response = await fetch("/api/rag/query/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          sessionId: active.sessionId,
          knowledgeBaseId: active.knowledgeBaseId,
          topK: FIXED_TOP_K,
          enableMindMap
        })
      });

      if (!response.ok || !response.body) {
        throw new Error("请求失败，状态码 " + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const drained = splitSseBuffer(buffer);
        buffer = drained.rest;

        for (const eventText of drained.events) {
          const evt = parseSse(eventText);
          if (!evt) {
            continue;
          }
          handleStreamEvent(evt);
        }
      }

      const trailing = buffer.trim();
      if (trailing) {
        const evt = parseSse(trailing);
        if (evt) {
          handleStreamEvent(evt);
        }
      }
    } catch (error) {
      assistantMessage.text = "请求失败：" + (error.message || "未知错误");
      currentHistory[currentHistory.length - 1] = { ...assistantMessage };
      updateMessageNode(assistantNode, assistantMessage);
      minorHint.textContent = "本次请求失败，请稍后重试";
      minorHint.className = "error";
    } finally {
      currentHistory = normalizeHistory(currentHistory);
      saveHistory(active.knowledgeBaseId, currentHistory);
      sendBtn.disabled = false;
      renderKbList();
    }
  }

  function renderChatHistory(history, keepScrollBottom) {
    chatWrap.innerHTML = "";
    history.forEach((message) => appendMessage(message.role, message.text, message.source));
    if (keepScrollBottom) {
      scrollBottom();
    }
  }

  function appendMessage(role, text, source) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    const content = document.createElement("div");
    content.className = "msg-content";
    if (role === "assistant") {
      content.innerHTML = markdownToHtml(text || "");
    } else {
      content.textContent = text;
    }
    div.appendChild(content);

    if (role === "assistant" && source) {
      const sourceEl = document.createElement("div");
      sourceEl.className = "msg-source";
      sourceEl.textContent = "来源: " + source;
      div.appendChild(sourceEl);
    }

    chatWrap.appendChild(div);
    scrollBottom();
    return div;
  }

  function updateMessageNode(node, message) {
    const content = node.querySelector(".msg-content");
    if (content) {
      content.innerHTML = markdownToHtml(message.text || "");
    }

    let sourceEl = node.querySelector(".msg-source");
    if (message.source) {
      if (!sourceEl) {
        sourceEl = document.createElement("div");
        sourceEl.className = "msg-source";
        node.appendChild(sourceEl);
      }
      sourceEl.textContent = "来源: " + message.source;
    } else if (sourceEl) {
      sourceEl.remove();
    }
    scrollBottom();
  }

  function readHistory(knowledgeBaseId) {
    if (!knowledgeBaseId) {
      return [];
    }
    const raw = localStorage.getItem(historyKey(knowledgeBaseId));
    if (!raw) {
      return [];
    }
    try {
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) {
        return [];
      }
      return normalizeHistory(parsed);
    } catch (_) {
      return [];
    }
  }

  function saveHistory(knowledgeBaseId, history) {
    if (!knowledgeBaseId) {
      return;
    }
    localStorage.setItem(historyKey(knowledgeBaseId), JSON.stringify(normalizeHistory(history)));
  }

  function normalizeHistory(history) {
    if (!Array.isArray(history)) {
      return [];
    }

    const sliced = history.slice(-MAX_HISTORY_MESSAGES);
    return sliced.map((msg) => {
      const role = msg && msg.role === "user" ? "user" : "assistant";
      const text = shorten(String((msg && msg.text) || ""), MAX_MESSAGE_CHARS);
      const source = msg && msg.source ? String(msg.source) : "";
      return { role, text, source };
    });
  }

  function historyKey(knowledgeBaseId) {
    return "prag.history." + knowledgeBaseId;
  }

  function parseSse(raw) {
    const lines = raw.split("\n");
    let name = "message";
    const data = [];

    lines.forEach((line) => {
      if (line.startsWith("event:")) {
        name = line.slice(6).trim();
      }
      if (line.startsWith("data:")) {
        data.push(line.slice(5).trim());
      }
    });

    if (data.length === 0) {
      return null;
    }
    return { name, data: data.join("\n") };
  }

  function splitSseBuffer(rawBuffer) {
    const normalized = String(rawBuffer || "").replace(/\r\n/g, "\n");
    const parts = normalized.split("\n\n");
    if (parts.length <= 1) {
      return { events: [], rest: normalized };
    }
    return {
      events: parts.slice(0, -1),
      rest: parts[parts.length - 1] || ""
    };
  }

  function safeJson(text) {
    try {
      return JSON.parse(text);
    } catch (_) {
      return null;
    }
  }

  function shorten(text, max) {
    if (!text) {
      return "";
    }
    const normalized = String(text).replace(/\s+/g, " ").trim();
    return normalized.length <= max ? normalized : normalized.slice(0, max) + "...";
  }

  function scrollBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function markdownToHtml(markdown) {
    const lines = String(markdown || "").replace(/\r/g, "").split("\n");
    const html = [];
    let inCode = false;
    let inList = false;
    const codeBuffer = [];

    const closeList = () => {
      if (inList) {
        html.push("</ul>");
        inList = false;
      }
    };

    for (const rawLine of lines) {
      const line = rawLine || "";
      const trimmed = line.trim();

      if (trimmed.startsWith("```")) {
        if (inCode) {
          html.push("<pre><code>" + escapeHtml(codeBuffer.join("\n")) + "</code></pre>");
          codeBuffer.length = 0;
          inCode = false;
        } else {
          closeList();
          inCode = true;
        }
        continue;
      }

      if (inCode) {
        codeBuffer.push(line);
        continue;
      }

      if (/^[-*]\s+/.test(trimmed)) {
        if (!inList) {
          html.push("<ul>");
          inList = true;
        }
        html.push("<li>" + formatInline(trimmed.replace(/^[-*]\s+/, "")) + "</li>");
        continue;
      }

      closeList();

      if (trimmed.length === 0) {
        html.push("<p></p>");
        continue;
      }

      if (/^###\s+/.test(trimmed)) {
        html.push("<h3>" + formatInline(trimmed.replace(/^###\s+/, "")) + "</h3>");
      } else if (/^##\s+/.test(trimmed)) {
        html.push("<h2>" + formatInline(trimmed.replace(/^##\s+/, "")) + "</h2>");
      } else if (/^#\s+/.test(trimmed)) {
        html.push("<h1>" + formatInline(trimmed.replace(/^#\s+/, "")) + "</h1>");
      } else {
        html.push("<p>" + formatInline(trimmed) + "</p>");
      }
    }

    closeList();
    if (inCode) {
      html.push("<pre><code>" + escapeHtml(codeBuffer.join("\n")) + "</code></pre>");
    }

    return html.join("");
  }

  function formatInline(text) {
    let s = escapeHtml(text);
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img class="mindmap-image" alt="$1" src="$2" />');
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    s = s.replace(/\[([^\]]+)]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return s;
  }

  function appendMindMapImage(command) {
    if (!command || !command.arguments) {
      return { rendered: false, fallback: false, reason: "" };
    }
    const imageUrl = command.arguments.imageUrl || command.arguments.diagramUrl || command.arguments.url;
    if (!imageUrl) {
      return { rendered: false, fallback: false, reason: "" };
    }

    const isFallback = Boolean(command.arguments.mcpFallback);
    const fallbackReason = command.arguments.mcpFallbackReason || "";

    let tipTitle = "思维导图";
    if (isFallback) {
      tipTitle = fallbackReason ? "思维导图（回退）- " + fallbackReason : "思维导图（回退）";
    }

    const tip = tipTitle + "\n\n![MindMap](" + imageUrl + ")";
    currentHistory.push({ role: "assistant", text: tip, source: "MindMap" });
    currentHistory = normalizeHistory(currentHistory);
    saveHistory(active.knowledgeBaseId, currentHistory);
    appendMessage("assistant", tip, "MindMap");
    return { rendered: true, fallback: isFallback, reason: fallbackReason };
  }

  function initSidebarState() {
    const collapsed = localStorage.getItem("prag.sidebar.collapsed") === "1";
    if (collapsed) {
      appRoot.classList.add("sidebar-collapsed");
    }
  }

  function toggleSidebar() {
    appRoot.classList.toggle("sidebar-collapsed");
    localStorage.setItem("prag.sidebar.collapsed", appRoot.classList.contains("sidebar-collapsed") ? "1" : "0");
  }

  function toggleMindMap() {
    enableMindMap = !enableMindMap;
    applyMindMapUiState();
    renderLogMetricsPanel();
  }

  function applyMindMapUiState() {
    mindMapBtn.classList.toggle("active", enableMindMap);
    resetMinorHint();
  }

  function resetMinorHint() {
    if (enableMindMap) {
      minorHint.textContent = "思维导图模式已开启，联网策略仍由系统自动判断";
    } else {
      minorHint.textContent = "自动策略已开启";
    }
    minorHint.className = "";
  }

  function toggleLogModal() {
    if (logModal.classList.contains("open")) {
      closeLogModal();
      return;
    }
    renderLogMetricsPanel();
    logModal.classList.add("open");
  }

  function closeLogModal() {
    logModal.classList.remove("open");
  }

  function closeLogModalOnOutsideClick(event) {
    if (!logModal.classList.contains("open")) {
      return;
    }
    if (logModal.contains(event.target) || logBtn.contains(event.target)) {
      return;
    }
    closeLogModal();
  }

  function renderLogMetricsPanel() {
    const metrics = active && active.knowledgeBaseId
      ? logMetricsByKnowledgeBase[active.knowledgeBaseId]
      : null;
    const viewModel = metrics || buildFallbackLogMetrics();
    logContent.innerHTML = renderLogGroups(viewModel);
  }

  function buildFallbackLogMetrics() {
    return {
      "会话信息": {
        "会话ID": active && active.sessionId ? active.sessionId : "-",
        "知识库ID": active && active.knowledgeBaseId ? active.knowledgeBaseId : "-",
        "文件名": active && active.fileName ? active.fileName : "-"
      },
      "提示": {
        "状态": "请先发送一次问题，生成实时日志指标"
      }
    };
  }

  function renderLogGroups(data) {
    if (!data || typeof data !== "object") {
      return "<div class='log-empty'>暂无日志数据</div>";
    }

    const groups = Object.entries(data).map(([key, value]) => {
      if (value && typeof value === "object" && !Array.isArray(value)) {
        const rows = Object.entries(value).map(([itemKey, itemValue]) => {
          return "<div class='log-row'><div class='log-key'>" + escapeHtml(itemKey)
            + "</div><div class='log-value'>" + escapeHtml(renderLogValue(itemValue)) + "</div></div>";
        }).join("");

        return "<section class='log-group'><div class='log-group-title'>" + escapeHtml(key)
          + "</div>" + rows + "</section>";
      }

      return "<section class='log-group'><div class='log-group-title'>" + escapeHtml(key)
        + "</div><div class='log-row'><div class='log-key'>值</div><div class='log-value'>"
        + escapeHtml(renderLogValue(value)) + "</div></div></section>";
    }).join("");

    return groups || "<div class='log-empty'>暂无日志数据</div>";
  }

  function renderLogValue(value) {
    if (value === null || value === undefined) {
      return "-";
    }
    if (typeof value === "object") {
      return JSON.stringify(value);
    }
    return String(value);
  }

  questionInput.addEventListener("input", () => {
    questionInput.style.height = "46px";
    questionInput.style.height = Math.min(questionInput.scrollHeight, 180) + "px";
  });

  function escapeHtml(input) {
    return String(input)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
