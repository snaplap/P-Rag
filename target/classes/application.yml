server:
  port: 8080

spring:
  application:
    name: p-rag
  config:
    # 启动时自动加载 .env 与 secrets，避免本地运行时丢失 API Key。
    import: optional:file:.env[.properties],optional:file:./P-Rag/.env[.properties],optional:file:./config/application-secrets.yml
  data:
    redis:
      # 容器化部署时可直接通过环境变量覆盖，默认走本机映射端口。
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}

app:
  rag:
    llm:
      # 模型提供商标识（示例：dashscope/openai/zhipu）
      provider: ${LLM_PROVIDER:dashscope}
      # 阿里云百炼 OpenAI 兼容网关地址。
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      # 百炼 API Key，建议通过环境变量注入，不要硬编码。
      api-key: ${LLM_API_KEY:${DASHSCOPE_API_KEY:}}
      # 对话模型名称。
      model: ${LLM_MODEL:qwen-plus}
      # 向量模型名称。
      embedding-model: ${EMBEDDING_MODEL:text-embedding-v3}
      # 重排模型名称。
      rerank-model: ${RERANK_MODEL:gte-rerank-v2}
      # 重排服务 URL（百炼原生接口）。
      rerank-url: ${RERANK_URL:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
      # 可单独配置重排 API Key；未配置时复用 llm.api-key。
      rerank-api-key: ${RERANK_API_KEY:}
      connect-timeout-ms: ${LLM_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${LLM_READ_TIMEOUT_MS:60000}
    stream:
      chunk-size: 28
    cache:
      key-prefix: "rag:answer:"
      ttl-seconds: 900
    session:
      key-prefix: "rag:session:"
      ttl-seconds: 1800
      max-history: 3
    embedding:
      dimension: ${EMBEDDING_DIMENSION:1024}
      batch-size: ${EMBEDDING_BATCH_SIZE:10}
      cache-enabled: ${EMBEDDING_CACHE_ENABLED:true}
      cache-ttl-seconds: ${EMBEDDING_CACHE_TTL_SECONDS:604800}
    retrieval:
      default-top-k: 5
      min-score: 0.45
    chunking:
      max-chars: 500
      overlap-chars: 80
    milvus:
      collection: ${MILVUS_COLLECTION:rag_knowledge_chunks}
      # 默认为 true，表示优先使用 Docker 中的 Milvus 服务。
      use-remote: ${MILVUS_USE_REMOTE:true}
      base-url: ${MILVUS_BASE_URL:http://localhost:19530}
    mcp:
      use-mock: ${MCP_USE_MOCK:false}
      web-search-url: ${MCP_WEB_SEARCH_URL:http://localhost:18080/mcp/web-search/search}
      diagram-url: ${MCP_DIAGRAM_URL:http://localhost:18081/mcp/diagram}
      call-timeout-ms: ${MCP_CALL_TIMEOUT_MS:6000}
      max-retries: ${MCP_MAX_RETRIES:2}
      retry-backoff-ms: ${MCP_RETRY_BACKOFF_MS:250}
      circuit-breaker-threshold: ${MCP_CIRCUIT_BREAKER_THRESHOLD:3}
      circuit-breaker-open-ms: ${MCP_CIRCUIT_BREAKER_OPEN_MS:30000}
    metrics:
      input-cost-per1k-tokens: ${RAG_INPUT_COST_PER_1K:0}
      output-cost-per1k-tokens: ${RAG_OUTPUT_COST_PER_1K:0}
logging:
  level:
    root: INFO
    "[com.zzp.rag]": INFO
