<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-Rag Chat</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dde4ea;
      --text: #21303d;
      --muted: #627585;
      --primary: #3b6f8b;
      --primary-soft: #e8f1f6;
      --sidebar-bg: #1e2630;
      --sidebar-text: #e7edf3;
      --sidebar-muted: #a8b6c3;
      --sidebar-item: #2a3440;
      --sidebar-item-hover: #32404e;
      --radius: 14px;
      --shadow: 0 10px 25px rgba(25, 42, 58, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% -10%, #e7eef4 0, transparent 45%), var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    .sidebar {
      background: linear-gradient(180deg, #1d2630 0%, #242f3a 100%);
      color: var(--sidebar-text);
      border-right: 1px solid #33404d;
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
      gap: 14px;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .upload-wrap {
      border: 1px solid #3a4b5c;
      border-radius: 12px;
      padding: 10px;
      background: #27323e;
    }

    .upload-title {
      font-size: 12px;
      color: var(--sidebar-muted);
      margin-bottom: 8px;
    }

    .upload-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(120deg, #5c8da8 0%, #4d7a92 100%);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 20px rgba(77, 122, 146, 0.35);
    }

    .upload-btn:hover {
      transform: translateY(-1px);
    }

    .upload-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .upload-meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--sidebar-muted);
      line-height: 1.45;
      min-height: 34px;
    }

    .kb-title {
      font-size: 12px;
      color: var(--sidebar-muted);
      margin: 4px 0 0;
      padding: 0 2px;
    }

    .kb-list {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }

    .kb-item {
      border: 1px solid #343434;
      border-radius: 12px;
      background: var(--sidebar-item);
      padding: 10px 10px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .kb-item:hover {
      background: var(--sidebar-item-hover);
      transform: translateY(-1px);
    }

    .kb-item.active {
      border-color: #86a9bf;
      background: #395265;
    }

    .kb-name {
      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .kb-meta {
      margin-top: 4px;
      font-size: 11px;
      color: #aeb6c2;
      line-height: 1.4;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      height: 58px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.65);
    }

    .active-name {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 560px;
    }

    .status {
      font-size: 12px;
      color: #4b5563;
      background: #edf4f8;
      border: 1px solid #d7e5ee;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .chat-scroll {
      overflow: auto;
      min-height: 0;
      padding: 24px 0;
      overscroll-behavior: contain;
    }

    .chat-wrap {
      width: min(860px, calc(100% - 36px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 92%;
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.72;
      white-space: pre-wrap;
      animation: fadeUp 0.24s ease;
      border: 1px solid transparent;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary-soft);
      border-color: #d7e4ff;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #ffffff;
      border-color: #eaedf3;
      box-shadow: var(--shadow);
    }

    .msg-source {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .composer-shell {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--line);
      background: #fff;
      position: sticky;
      bottom: 0;
      z-index: 4;
    }

    .composer {
      width: min(860px, calc(100% - 36px));
      margin: 0 auto;
      border: 1px solid #dfe4ed;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer:focus-within {
      border-color: #b4c8ff;
      box-shadow: 0 10px 26px rgba(59, 130, 246, 0.16);
    }

    #questionInput {
      border: 0;
      outline: none;
      resize: none;
      min-height: 46px;
      max-height: 180px;
      font: inherit;
      line-height: 1.6;
      color: #111827;
      padding: 6px 8px;
      background: transparent;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: #29475c;
      color: #fff;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.2s ease;
      align-self: end;
      font-size: 18px;
    }

    .send-btn:hover {
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .composer-tip {
      width: min(860px, calc(100% - 36px));
      margin: 7px auto 0;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .warn {
      color: #b45309;
    }

    .error {
      color: #b91c1c;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(220px, 34vh) minmax(0, 1fr);
      }

      .sidebar {
        height: auto;
        overflow: auto;
      }

      .main {
        min-height: 0;
      }

      .chat-wrap,
      .composer,
      .composer-tip {
        width: calc(100% - 20px);
      }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">P-Rag Workspace</div>

    <div class="upload-wrap">
      <div class="upload-title">上传 Markdown 到新知识库</div>
      <input id="mdFile" type="file" accept=".md,text/markdown" style="display:none">
      <button id="uploadBtn" class="upload-btn">+ 上传并创建新对话</button>
      <div id="uploadMeta" class="upload-meta">未选择文件</div>
      <div class="upload-meta" style="min-height:0;">检索参数已自动优化</div>
    </div>

    <div class="kb-title">知识库会话记录</div>
    <div id="kbList" class="kb-list"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="dot"></div>
        <div id="activeName" class="active-name">请先上传 Markdown 文件开始对话</div>
      </div>
      <div id="runStatus" class="status">空闲</div>
    </header>

    <section id="chatScroll" class="chat-scroll">
      <div id="chatWrap" class="chat-wrap"></div>
    </section>

    <footer class="composer-shell">
      <div class="composer">
        <textarea id="questionInput" placeholder="给知识库提问，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="sendBtn" class="send-btn" title="发送">↑</button>
      </div>
      <div class="composer-tip">
        <span>回答默认基于当前知识库内容生成</span>
        <span id="minorHint">运行细节默认隐藏</span>
      </div>
    </footer>
  </main>
</div>

<script>
  const mdFile = document.getElementById("mdFile");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadMeta = document.getElementById("uploadMeta");
  const kbList = document.getElementById("kbList");
  const activeName = document.getElementById("activeName");
  const runStatus = document.getElementById("runStatus");
  const FIXED_TOP_K = 5;
  const questionInput = document.getElementById("questionInput");
  const sendBtn = document.getElementById("sendBtn");
  const chatWrap = document.getElementById("chatWrap");
  const chatScroll = document.getElementById("chatScroll");
  const minorHint = document.getElementById("minorHint");

  const MAX_HISTORY_MESSAGES = 120;
  const MAX_MESSAGE_CHARS = 12000;

  let traces = [];
  let active = null;
  let currentHistory = [];

  initialize();

  async function initialize() {
    bindEvents();
    await loadKnowledgeBases();
    if (!active) {
      appendMessage("assistant", "欢迎使用。先上传一个 Markdown 文件，我会为它创建独立知识库并开启新对话。");
    }
  }

  function bindEvents() {
    uploadBtn.addEventListener("click", () => mdFile.click());

    mdFile.addEventListener("change", async () => {
      const file = mdFile.files && mdFile.files[0];
      if (!file) {
        uploadMeta.textContent = "未选择文件";
        return;
      }
      uploadMeta.textContent = "已选择: " + file.name;
      await uploadMarkdown(file);
    });

    sendBtn.addEventListener("click", () => sendQuestion());

    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });
  }

  async function uploadMarkdown(file) {
    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadMeta.textContent = "上传中...";
    uploadMeta.className = "upload-meta";

    try {
      const response = await fetch("/api/rag/ingest/markdown", {
        method: "POST",
        body: formData
      });
      if (!response.ok) {
        throw new Error("上传失败，状态码 " + response.status);
      }

      const result = await response.json();
      active = {
        knowledgeBaseId: result.knowledgeBaseId,
        sessionId: result.sessionId,
        fileName: result.fileName || result.knowledgeBaseId,
        chunkCount: result.chunkCount
      };

      saveHistory(active.knowledgeBaseId, [
        {
          role: "assistant",
          text: "已完成文档上传。现在可以开始针对该文档提问。"
        }
      ]);

      uploadMeta.textContent = "上传成功: " + active.fileName + "（" + active.chunkCount + " 段）";
      uploadMeta.className = "upload-meta";
      await loadKnowledgeBases();
      switchKnowledge(active.knowledgeBaseId);
    } catch (error) {
      uploadMeta.textContent = "上传失败: " + (error.message || "未知错误");
      uploadMeta.className = "upload-meta error";
    } finally {
      uploadBtn.disabled = false;
    }
  }

  async function loadKnowledgeBases() {
    try {
      const response = await fetch("/api/rag/knowledge-bases", { method: "GET" });
      if (!response.ok) {
        throw new Error("加载知识库列表失败");
      }

      traces = await response.json();
      renderKbList();

      if (!active && traces.length > 0) {
        active = {
          knowledgeBaseId: traces[0].knowledgeBaseId,
          sessionId: traces[0].sessionId,
          fileName: traces[0].fileName,
          chunkCount: traces[0].chunkCount
        };
        switchKnowledge(active.knowledgeBaseId);
      }
    } catch (error) {
      kbList.innerHTML = "<div class='kb-meta'>知识库历史加载失败</div>";
    }
  }

  function renderKbList() {
    kbList.innerHTML = "";
    if (!Array.isArray(traces) || traces.length === 0) {
      kbList.innerHTML = "<div class='kb-meta'>暂无知识库记录</div>";
      return;
    }

    traces.forEach((trace) => {
      const item = document.createElement("div");
      item.className = "kb-item" + (active && active.knowledgeBaseId === trace.knowledgeBaseId ? " active" : "");

      const history = readHistory(trace.knowledgeBaseId);
      const lastUser = [...history].reverse().find((m) => m.role === "user");
      const preview = lastUser ? shorten(lastUser.text, 20) : "暂无提问记录";

      item.innerHTML = [
        "<div class='kb-name'>" + escapeHtml(trace.fileName || trace.knowledgeBaseId) + "</div>",
        "<div class='kb-meta'>" + escapeHtml(preview) + "</div>",
        "<div class='kb-meta'>KB: " + escapeHtml(trace.knowledgeBaseId) + "</div>"
      ].join("");

      item.addEventListener("click", () => switchKnowledge(trace.knowledgeBaseId));
      kbList.appendChild(item);
    });
  }

  function switchKnowledge(knowledgeBaseId) {
    const trace = traces.find((t) => t.knowledgeBaseId === knowledgeBaseId);
    if (!trace) {
      return;
    }

    active = {
      knowledgeBaseId: trace.knowledgeBaseId,
      sessionId: trace.sessionId,
      fileName: trace.fileName || trace.knowledgeBaseId,
      chunkCount: trace.chunkCount
    };

    activeName.textContent = "当前知识库: " + active.fileName;
    renderKbList();

    currentHistory = readHistory(active.knowledgeBaseId);
    renderChatHistory(currentHistory);
    minorHint.textContent = "运行细节默认隐藏";
    minorHint.className = "";
  }

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question) {
      return;
    }
    if (!active) {
      minorHint.textContent = "请先上传文件后再提问";
      minorHint.className = "warn";
      return;
    }

    currentHistory.push({ role: "user", text: question });
    currentHistory = normalizeHistory(currentHistory);
    saveHistory(active.knowledgeBaseId, currentHistory);
    const userNode = appendMessage("user", question, null);
    userNode.scrollIntoView({ behavior: "smooth", block: "end" });

    questionInput.value = "";
    questionInput.style.height = "46px";
    runStatus.textContent = "生成中";
    sendBtn.disabled = true;
    minorHint.className = "";

    const assistantMessage = { role: "assistant", text: "", source: "" };
    currentHistory.push(assistantMessage);
    currentHistory = normalizeHistory(currentHistory);
    saveHistory(active.knowledgeBaseId, currentHistory);
    const assistantNode = appendMessage("assistant", "", "");
    let streamedChunks = 0;

    try {
      const response = await fetch("/api/rag/query/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          sessionId: active.sessionId,
          knowledgeBaseId: active.knowledgeBaseId,
          topK: FIXED_TOP_K
        })
      });

      if (!response.ok || !response.body) {
        throw new Error("请求失败，状态码 " + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop() || "";

        for (const eventText of events) {
          const evt = parseSse(eventText);
          if (!evt) {
            continue;
          }

          if (evt.name === "chunk") {
            const payload = safeJson(evt.data);
            if (payload && payload.content) {
              assistantMessage.text += payload.content;
              currentHistory[currentHistory.length - 1] = { ...assistantMessage };
              updateMessageNode(assistantNode, assistantMessage);
              streamedChunks++;
              if (streamedChunks % 8 === 0) {
                currentHistory = normalizeHistory(currentHistory);
                saveHistory(active.knowledgeBaseId, currentHistory);
              }
            }
          }

          if (evt.name === "final") {
            const payload = safeJson(evt.data);
            if (payload) {
              assistantMessage.source = payload.source || "知识库";
              currentHistory[currentHistory.length - 1] = { ...assistantMessage };
              if (payload.uncertain) {
                minorHint.textContent = "当前回答存在不确定性，可补充文档后再试";
                minorHint.className = "warn";
              }
              updateMessageNode(assistantNode, assistantMessage);
            }
          }

          if (evt.name === "error") {
            throw new Error("服务端流式错误");
          }
        }
      }
    } catch (error) {
      assistantMessage.text = "请求失败：" + (error.message || "未知错误");
      currentHistory[currentHistory.length - 1] = { ...assistantMessage };
      updateMessageNode(assistantNode, assistantMessage);
      minorHint.textContent = "本次请求失败，请稍后重试";
      minorHint.className = "error";
    } finally {
      currentHistory = normalizeHistory(currentHistory);
      saveHistory(active.knowledgeBaseId, currentHistory);
      runStatus.textContent = "空闲";
      sendBtn.disabled = false;
      renderKbList();
    }
  }

  function renderChatHistory(history, keepScrollBottom) {
    chatWrap.innerHTML = "";
    history.forEach((message) => appendMessage(message.role, message.text, message.source));
    if (keepScrollBottom) {
      scrollBottom();
    }
  }

  function appendMessage(role, text, source) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    const content = document.createElement("div");
    content.className = "msg-content";
    content.textContent = text;
    div.appendChild(content);

    if (role === "assistant" && source) {
      const sourceEl = document.createElement("div");
      sourceEl.className = "msg-source";
      sourceEl.textContent = "来源: " + source;
      div.appendChild(sourceEl);
    }

    chatWrap.appendChild(div);
    scrollBottom();
    return div;
  }

  function updateMessageNode(node, message) {
    const content = node.querySelector(".msg-content");
    if (content) {
      content.textContent = message.text || "";
    }

    let sourceEl = node.querySelector(".msg-source");
    if (message.source) {
      if (!sourceEl) {
        sourceEl = document.createElement("div");
        sourceEl.className = "msg-source";
        node.appendChild(sourceEl);
      }
      sourceEl.textContent = "来源: " + message.source;
    } else if (sourceEl) {
      sourceEl.remove();
    }
    scrollBottom();
  }

  function readHistory(knowledgeBaseId) {
    if (!knowledgeBaseId) {
      return [];
    }
    const raw = localStorage.getItem(historyKey(knowledgeBaseId));
    if (!raw) {
      return [];
    }
    try {
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) {
        return [];
      }
      return normalizeHistory(parsed);
    } catch (_) {
      return [];
    }
  }

  function saveHistory(knowledgeBaseId, history) {
    if (!knowledgeBaseId) {
      return;
    }
    localStorage.setItem(historyKey(knowledgeBaseId), JSON.stringify(normalizeHistory(history)));
  }

  function normalizeHistory(history) {
    if (!Array.isArray(history)) {
      return [];
    }

    const sliced = history.slice(-MAX_HISTORY_MESSAGES);
    return sliced.map((msg) => {
      const role = msg && msg.role === "user" ? "user" : "assistant";
      const text = shorten(String((msg && msg.text) || ""), MAX_MESSAGE_CHARS);
      const source = msg && msg.source ? String(msg.source) : "";
      return { role, text, source };
    });
  }

  function historyKey(knowledgeBaseId) {
    return "prag.history." + knowledgeBaseId;
  }

  function parseSse(raw) {
    const lines = raw.split("\n");
    let name = "message";
    const data = [];

    lines.forEach((line) => {
      if (line.startsWith("event:")) {
        name = line.slice(6).trim();
      }
      if (line.startsWith("data:")) {
        data.push(line.slice(5).trim());
      }
    });

    if (data.length === 0) {
      return null;
    }
    return { name, data: data.join("\n") };
  }

  function safeJson(text) {
    try {
      return JSON.parse(text);
    } catch (_) {
      return null;
    }
  }

  function shorten(text, max) {
    if (!text) {
      return "";
    }
    const normalized = String(text).replace(/\s+/g, " ").trim();
    return normalized.length <= max ? normalized : normalized.slice(0, max) + "...";
  }

  function scrollBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  questionInput.addEventListener("input", () => {
    questionInput.style.height = "46px";
    questionInput.style.height = Math.min(questionInput.scrollHeight, 180) + "px";
  });

  function escapeHtml(input) {
    return String(input)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
