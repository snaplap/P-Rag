<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-Rag 智能问答台</title>
  <style>
    :root {
      --bg-a: #f5f7f2;
      --bg-b: #e8efe8;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(42, 56, 43, 0.14);
      --text-main: #203126;
      --text-sub: #58725f;
      --accent: #2b8a5d;
      --accent-soft: #cfeadb;
      --warn: #9a6e1d;
      --danger: #9b3e3e;
      --shadow-lg: 0 18px 50px rgba(29, 53, 40, 0.12);
      --shadow-sm: 0 6px 18px rgba(29, 53, 40, 0.08);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 12% 10%, #eef9f1 0%, transparent 38%),
        radial-gradient(circle at 88% 8%, #f8f2e7 0%, transparent 35%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      animation: bgFloat 10s ease-in-out infinite alternate;
    }

    .layout {
      width: min(1180px, 94vw);
      margin: 28px auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .panel {
      backdrop-filter: blur(12px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(10px);
      animation: reveal 0.75s ease forwards;
    }

    .left {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation-delay: 0.05s;
    }

    .right {
      display: flex;
      flex-direction: column;
      min-height: 78vh;
      overflow: hidden;
      animation-delay: 0.14s;
    }

    .brand {
      padding: 10px 6px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.18rem;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow-sm);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 0.96rem;
    }

    .hint {
      margin-top: 8px;
      color: var(--text-sub);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 10px;
    }

    label {
      font-size: 0.84rem;
      color: var(--text-sub);
      font-weight: 600;
    }

    input[type="text"],
    textarea {
      border: 1px solid rgba(63, 90, 70, 0.28);
      border-radius: var(--radius-sm);
      font: inherit;
      color: var(--text-main);
      padding: 10px 12px;
      background: white;
      outline: none;
      transition: border-color 0.24s ease, box-shadow 0.24s ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(43, 138, 93, 0.15);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .file-name {
      font-size: 0.82rem;
      color: var(--text-sub);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.86rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(120deg, #2b8a5d, #419d72);
      color: #fff;
      box-shadow: 0 8px 18px rgba(44, 131, 89, 0.28);
    }

    .btn-subtle {
      background: #edf4ef;
      color: #2f5140;
      border: 1px solid rgba(56, 89, 68, 0.2);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.65);
    }

    .chat-head .title {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .status {
      font-size: 0.8rem;
      color: var(--text-sub);
      padding: 4px 10px;
      border: 1px solid rgba(82, 110, 92, 0.2);
      border-radius: 999px;
      background: #f3f8f4;
    }

    .chat-body {
      flex: 1;
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.66));
    }

    .msg {
      max-width: min(86%, 760px);
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 0.93rem;
      white-space: pre-wrap;
      animation: messageIn 0.3s ease;
      border: 1px solid transparent;
    }

    .msg.user {
      align-self: flex-end;
      background: #dff4e8;
      border-color: #c8e9d8;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #ffffff;
      border-color: #dbe9df;
    }

    .meta {
      align-self: flex-start;
      width: min(86%, 760px);
      background: #fafdfb;
      border: 1px dashed #bed8c7;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.84rem;
      color: #3f594a;
      line-height: 1.6;
      animation: messageIn 0.35s ease;
    }

    .mindmap {
      margin-top: 8px;
      background: #f4faf6;
      border: 1px solid #d5e8dc;
      border-radius: 10px;
      padding: 8px;
      overflow: auto;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.77rem;
      color: #3c5a49;
    }

    .chat-foot {
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(255, 255, 255, 0.78);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .compose {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tip {
      font-size: 0.78rem;
      color: var(--text-sub);
    }

    .danger {
      color: var(--danger);
    }

    .warn {
      color: var(--warn);
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bgFloat {
      from {
        background-position: 0 0, 0 0, 0 0;
      }
      to {
        background-position: 12px -18px, -10px 10px, 0 0;
      }
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .right {
        min-height: 70vh;
      }

      .msg,
      .meta {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="panel left">
    <div class="brand">
      <h1>P-Rag 企业问答台</h1>
      <p>上传 Markdown 文档，基于知识库对话；低置信度自动触发联网兜底并输出 MindMap 指令。</p>
    </div>

    <section class="card">
      <h3>会话设置</h3>
      <div class="field">
        <label for="sessionId">Session ID</label>
        <input id="sessionId" type="text" placeholder="例如 user-001" value="web-session-001">
      </div>
      <div class="field">
        <label for="topK">TopK</label>
        <input id="topK" type="text" placeholder="默认 5" value="5">
      </div>
      <div class="hint">提示：同一 Session ID 会复用必要历史，支持轻量对话记忆。</div>
    </section>

    <section class="card">
      <h3>上传 Markdown</h3>
      <div class="file-row">
        <input id="mdFile" type="file" accept=".md,text/markdown">
      </div>
      <div class="file-name" id="fileName">未选择文件</div>
      <div class="file-row" style="margin-top: 10px;">
        <button class="btn btn-primary" id="uploadBtn">上传并向量化</button>
      </div>
      <div class="hint" id="uploadStatus">等待上传。</div>
    </section>
  </aside>

  <main class="panel right">
    <div class="chat-head">
      <div class="title">RAG 对话</div>
      <div class="status" id="runStatus">空闲</div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="msg assistant">你好，我已就绪。先上传 Markdown 文档，然后开始提问。</div>
    </div>

    <div class="chat-foot">
      <div class="compose">
        <textarea id="questionInput" placeholder="输入你的问题，回答将以流式返回..."></textarea>
        <div class="tip">回答会标记数据来源（知识库/联网），证据不足会声明不确定。</div>
      </div>
      <button class="btn btn-primary" id="sendBtn" style="height: 46px; align-self: end;">发送</button>
    </div>
  </main>
</div>

<script>
  const chatBody = document.getElementById("chatBody");
  const runStatus = document.getElementById("runStatus");
  const sessionIdInput = document.getElementById("sessionId");
  const topKInput = document.getElementById("topK");
  const questionInput = document.getElementById("questionInput");
  const sendBtn = document.getElementById("sendBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("mdFile");
  const fileName = document.getElementById("fileName");
  const uploadStatus = document.getElementById("uploadStatus");

  fileInput.addEventListener("change", () => {
    const file = fileInput.files && fileInput.files[0];
    fileName.textContent = file ? file.name : "未选择文件";
  });

  uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) {
      uploadStatus.textContent = "请先选择 Markdown 文件。";
      uploadStatus.className = "hint warn";
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadStatus.textContent = "上传中...";
    uploadStatus.className = "hint";

    try {
      const response = await fetch("/api/rag/ingest/markdown", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error("上传失败，状态码 " + response.status);
      }

      const data = await response.json();
      uploadStatus.textContent = "上传成功：documentId=" + data.documentId + "，chunkCount=" + data.chunkCount;
      uploadStatus.className = "hint";
    } catch (err) {
      uploadStatus.textContent = "上传失败：" + (err.message || "未知错误");
      uploadStatus.className = "hint danger";
    } finally {
      uploadBtn.disabled = false;
    }
  });

  sendBtn.addEventListener("click", async () => {
    const question = questionInput.value.trim();
    if (!question) {
      return;
    }

    const sessionId = sessionIdInput.value.trim() || "web-session-001";
    const topK = Number.parseInt(topKInput.value.trim() || "5", 10);

    appendMessage("user", question);
    questionInput.value = "";

    const assistantBubble = appendMessage("assistant", "");
    let finalPayload = null;

    setBusy(true);
    try {
      const response = await fetch("/api/rag/query/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          question,
          sessionId,
          topK: Number.isNaN(topK) ? 5 : topK
        })
      });

      if (!response.ok || !response.body) {
        throw new Error("请求失败，状态码 " + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop() || "";

        for (const evt of events) {
          const parsed = parseSseEvent(evt);
          if (!parsed) {
            continue;
          }

          if (parsed.name === "chunk") {
            const payload = safeJson(parsed.data);
            if (payload && payload.content) {
              assistantBubble.textContent += payload.content;
              scrollToBottom();
            }
          }

          if (parsed.name === "final") {
            finalPayload = safeJson(parsed.data);
          }

          if (parsed.name === "error") {
            const errPayload = safeJson(parsed.data);
            throw new Error(errPayload && errPayload.message ? errPayload.message : "服务端流式错误");
          }
        }
      }

      if (finalPayload) {
        appendMeta(finalPayload);
      }
    } catch (err) {
      appendMeta({
        source: "未知",
        uncertain: true,
        cacheHit: false,
        evaluation: {
          note: "流式请求失败"
        },
        references: [],
        mindMapCommand: {
          tool: "mindmap.generate",
          arguments: {
            error: err.message || "未知错误"
          }
        }
      });
      assistantBubble.textContent = "本次请求失败：" + (err.message || "未知错误");
    } finally {
      setBusy(false);
    }
  });

  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chatBody.appendChild(div);
    scrollToBottom();
    return div;
  }

  function appendMeta(finalPayload) {
    const div = document.createElement("div");
    div.className = "meta";

    const refs = Array.isArray(finalPayload.references) ? finalPayload.references : [];
    const evalInfo = finalPayload.evaluation || {};

    div.innerHTML = [
      "<div><strong>数据来源：</strong>" + escapeHtml(String(finalPayload.source || "未知")) + "</div>",
      "<div><strong>不确定性：</strong>" + (finalPayload.uncertain ? "是" : "否") + "</div>",
      "<div><strong>缓存命中：</strong>" + (finalPayload.cacheHit ? "是" : "否") + "</div>",
      "<div><strong>证据数量：</strong>" + refs.length + "</div>",
      "<div><strong>评估备注：</strong>" + escapeHtml(String(evalInfo.note || "-")) + "</div>"
    ].join("");

    const cmd = document.createElement("div");
    cmd.className = "mindmap";
    cmd.textContent = "MindMap调用指令\n" + JSON.stringify(finalPayload.mindMapCommand || {}, null, 2);
    div.appendChild(cmd);

    chatBody.appendChild(div);
    scrollToBottom();
  }

  function parseSseEvent(rawEvent) {
    const lines = rawEvent.split("\n");
    let name = "message";
    const dataLines = [];

    for (const line of lines) {
      if (line.startsWith("event:")) {
        name = line.slice(6).trim();
      }
      if (line.startsWith("data:")) {
        dataLines.push(line.slice(5).trim());
      }
    }

    if (dataLines.length === 0) {
      return null;
    }

    return {
      name,
      data: dataLines.join("\n")
    };
  }

  function safeJson(raw) {
    try {
      return JSON.parse(raw);
    } catch (_) {
      return null;
    }
  }

  function setBusy(busy) {
    runStatus.textContent = busy ? "生成中" : "空闲";
    sendBtn.disabled = busy;
  }

  function scrollToBottom() {
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function escapeHtml(input) {
    return input
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
