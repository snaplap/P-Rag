server:
  port: 8080

spring:
  application:
    name: p-rag
  datasource:
    url: jdbc:h2:mem:prag;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  rag:
    stream:
      chunk-size: 28
    cache:
      key-prefix: "rag:answer:"
      ttl-seconds: 900
    session:
      key-prefix: "rag:session:"
      ttl-seconds: 1800
      max-history: 3
    embedding:
      dimension: 128
    retrieval:
      default-top-k: 5
      min-score: 0.45
    chunking:
      max-chars: 500
      overlap-chars: 80
    milvus:
      collection: rag_knowledge_chunks
      use-remote: false
      base-url: http://localhost:19530
    mcp:
      use-mock: true
logging:
  level:
    root: INFO
    com.zzp.rag: INFO
