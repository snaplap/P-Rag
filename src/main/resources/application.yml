server:
  port: 8080

spring:
  application:
    name: p-rag
  config:
    # 可在项目根目录 config/application-secrets.yml 写入私有配置，覆盖默认值。
    import: optional:file:./config/application-secrets.yml
  datasource:
    url: jdbc:h2:mem:prag;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      # 容器化部署时可直接通过环境变量覆盖，默认走本机映射端口。
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  rag:
    llm:
      # 模型提供商标识（示例：dashscope/openai/zhipu）
      provider: ${LLM_PROVIDER:deepseek}
      # 兼容 OpenAI 协议的网关地址，用户可替换为自有网关。
      base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
      # 大模型 API Key，建议通过环境变量注入，不要硬编码。
      api-key: ${LLM_API_KEY:}
      # 对话模型名称。
      model: ${LLM_MODEL:deepseek-chat}
      # 向量模型名称。
      embedding-model: ${EMBEDDING_MODEL:text-embedding-v3}
      connect-timeout-ms: ${LLM_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${LLM_READ_TIMEOUT_MS:60000}
    stream:
      chunk-size: 28
    cache:
      key-prefix: "rag:answer:"
      ttl-seconds: 900
    session:
      key-prefix: "rag:session:"
      ttl-seconds: 1800
      max-history: 3
    embedding:
      dimension: 128
    retrieval:
      default-top-k: 5
      min-score: 0.45
    chunking:
      max-chars: 500
      overlap-chars: 80
    milvus:
      collection: ${MILVUS_COLLECTION:rag_knowledge_chunks}
      # 默认为 true，表示优先使用 Docker 中的 Milvus 服务。
      use-remote: ${MILVUS_USE_REMOTE:true}
      base-url: ${MILVUS_BASE_URL:http://localhost:19530}
    mcp:
      use-mock: true
logging:
  level:
    root: INFO
    "[com.zzp.rag]": INFO
